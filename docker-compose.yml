version: "3.9"

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: autotest_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/autotest_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      DB_USER: root
      DB_PASSWORD: root
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      JWT_SECRET: replace-with-at-least-32-characters-secret-key
      CORS_ORIGINS: http://localhost:5173,http://localhost
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
