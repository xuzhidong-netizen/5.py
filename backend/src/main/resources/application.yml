server:
  port: ${PORT:8080}

spring:
  application:
    name: autotest-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/autotest_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  seed:
    admin-username: ${SEED_ADMIN_USERNAME:admin}
    admin-password: ${SEED_ADMIN_PASSWORD:admin123}

security:
  jwt:
    secret: ${JWT_SECRET:replace-with-at-least-32-characters-secret-key}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
